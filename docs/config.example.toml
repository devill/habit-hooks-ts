# Example .habit-hooks/config.toml — everything here is optional. An empty file
# means "use the plugin defaults". See docs/config.md.

languages = ["typescript"]   # add more for a multi-language repo

[scope]
changedOnly = false
branchBase = "main"

# Disable a sensor the plugin ships.
[sensors.knip]
disabled = true

# Raise the file-size threshold for the generic line-count sensor.
[sensors.line-count]
args = ["--max", "300"]

# Demote a smell from blocking to advisory.
[smells.duplicated-code]
severity = "suggested"

# Reuse a shared guide instead of the default redundant-type-annotation.md.
[smells.redundant-type-annotation]
guide = "style-nit.md"

# A project-local custom smell + its sensor (paired with
# .habit-hooks/typescript/sensors/marker.toml and guides/custom-marker.md).
[smells.custom-marker]
severity = "enforced"
title = "Custom marker"
description = "flagged by the project's own sensor"
